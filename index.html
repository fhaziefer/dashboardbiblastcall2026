<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Live Pendaftar - BIB Last Call 2026</title>
    <style>
        /* Variabel Warna Tema Dark Mode Modern */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-green: #34d399;
            --border-color: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            /* Padding base compact: atas-bawah 12px, kiri-kanan 16px */
            padding: 12px 16px;
            line-height: 1.5;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Bagian Atas / Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            font-size: 1.3rem;
            font-weight: 700;
        }

        /* Indikator Live Berkedip */
        .live-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            background-color: rgba(52, 211, 153, 0.1);
            color: var(--accent-green);
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 600;
            border: 1px solid rgba(52, 211, 153, 0.2);
        }

        .pulse {
            width: 8px;
            height: 8px;
            background-color: var(--accent-green);
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.7);
            animation: pulse 1.6s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(52, 211, 153, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); }
        }

        /* Layout Grid Otomatis (Mobile Friendly) */
        .grid-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        /* Jika dibuka di tablet/laptop, otomatis berubah jadi multi-kolom */
        @media (min-width: 768px) {
            /* Menyeimbangkan kembali padding di layar besar */
            body {
                padding: 30px;
            }
            .grid-layout {
                grid-template-columns: 1fr 2fr;
            }
            .full-width {
                grid-column: span 2;
            }
        }

        /* Desain Kartu (Cards) */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        .card-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Kartu Utama: Total Pendaftar */
        .hero-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-left: 4px solid var(--accent);
        }

        .hero-title {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .hero-value {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--accent);
            line-height: 1;
        }

        /* Desain Kategori Pendaftar Teks Tunggal */
        .category-row {
            display: flex;
            flex-wrap: wrap; /* Izinkan membungkus pada mobile sangat sempit */
            gap: 8px; /* Jarak rapat antara lencana kategori */
            justify-content: center; /* Pusatkan pada mobile */
            width: 100%;
        }

        @media (min-width: 768px) {
            .category-row {
                justify-content: space-around; /* Sejajarkan rapat di layar besar */
            }
        }

        .category-item {
            display: flex;
            align-items: center;
            gap: 6px; /* Jarak label dan jumlah lencana dikurangi */
            background-color: rgba(255, 255, 255, 0.05); /* Latar belakang item kategori */
            padding: 2px 6px;
            border-radius: 8px;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .category-label {
            font-weight: 500;
            color: var(--text-muted);
        }

        .category-badge-count {
            display: inline-block;
            min-width: 20px;
            padding: 1px 4px;
            font-weight: 700;
            border-radius: 6px;
            background-color: var(--accent);
            color: var(--bg-color);
            text-align: center;
        }

        /* Desain List Vertikal Jenis Beasiswa */
        .dense-list-card {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .dense-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background-color: rgba(255, 255, 255, 0.015);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 0.9rem;
        }

        .dense-item .label-wrap {
            word-wrap: break-word; /* Mengizinkan pemotongan kata panjang */
            overflow-wrap: break-word;
            flex: 1; /* Biarkan label mengambil ruang yang tersedia */
            margin-right: 12px; /* Jarak dari badge */
        }

        .dense-badge {
            display: inline-block;
            min-width: 28px;
            padding: 2px 8px;
            font-weight: 700;
            border-radius: 6px;
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            text-align: center;
        }

        /* Beri warna hijau menyala jika pendaftar beasiswa > 0 */
        .dense-badge.active {
            background-color: rgba(52, 211, 153, 0.15);
            color: var(--accent-green);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
    </style>
    <!-- Memuat library PapaParse untuk membaca CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>

    <div class="container">
        <header>
            <h1>BIB Last Call 2026</h1>
            <div class="live-badge">
                <div class="pulse"></div>
                LIVE
            </div>
        </header>

        <!-- Tempat Konten Dashboard Muncul -->
        <div id="dashboard-content" class="loading">
            Memuat data real-time dari Spreadsheet...
        </div>
    </div>

    <script>
        // MASUKKAN LINK CSV PUBLISH TO WEB ANDA DI SINI
        // Catatan: Gunakan tautan Publish to Web dengan parameter `&single=true&output=csv` dan gid yang benar.
        // Tautan representatif ini mengarah ke gid=2107913479 berdasarkan struktur Excel awal.
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQTjMPWdZiffrXO7PuS1K_E7YyBCIJg7aKZhQbv68wQYDIgM935dhNfc9z2I_7ysKfvKBkHl7lJYG0L/pub?gid=2107913479&single=true&output=csv';

        Papa.parse(csvUrl, {
            download: true,
            header: false,
            complete: function(results) {
                const data = results.data;
                
                if (!data || data.length === 0) {
                    document.getElementById('dashboard-content').innerHTML = '<p style="color:#ef4444; text-align:center;">Data kosong.</p>';
                    return;
                }

                // 1. Ambil Total Pendaftar (Baris 1 Kolom B -> data[0][1])
                const totalPendaftar = (data[0] && data[0][1]) ? data[0][1] : '0';

                // 2. Ambil Kategori Jenjang (S1, S2, S3 dari baris 2-4, kolom C & D)
                let kategoriHtml = '';
                // S1 (Sarjana): Baris 2, Kolom C & D
                if (data[1] && data[1][2]) {
                    kategoriHtml += `<div class="category-item"><span class="category-label">${data[1][2]}</span><span class="category-badge-count">${data[1][3] || '0'}</span></div>`;
                }
                // S2 (Magister): Baris 3, Kolom C & D
                if (data[2] && data[2][2]) {
                    kategoriHtml += `<div class="category-item"><span class="category-label">${data[2][2]}</span><span class="category-badge-count">${data[2][3] || '0'}</span></div>`;
                }
                // S3 (Doktoral): Baris 4, Kolom C & D
                if (data[3] && data[3][2]) {
                    kategoriHtml += `<div class="category-item"><span class="category-label">${data[3][2]}</span><span class="category-badge-count">${data[3][3] || '0'}</span></div>`;
                }

                // 3. Ambil Detail Jenis Beasiswa (Kolom E & F, baris ke-2 sampai ke-10, semua 9 item)
                let beasiswaRowsHtml = '';
                // Loop dari baris 2 (indeks 1) ke baris 10 (indeks 9)
                for (let i = 1; i <= 9; i++) {
                    if (data[i] && data[i][4] && data[i][4].trim() !== '') {
                        const jenis = data[i][4];
                        const jumlah = parseInt(data[i][5]) || 0;
                        
                        // Cek apakah ada pendaftar (> 0), kalau ada beri class khusus agar berwarna hijau
                        const badgeClass = jumlah > 0 ? 'dense-badge active' : 'dense-badge';
                        
                        beasiswaRowsHtml += `
                            <div class="dense-item">
                                <span class="label-wrap">${jenis}</span>
                                <span class="${badgeClass}">${jumlah}</span>
                            </div>
                        `;
                    }
                }

                // 4. Susun Semua Komponen Menjadi Layout Dashboard Responsive
                const dashboardHtml = `
                    <div class="grid-layout">
                        <!-- Kartu Total Utama -->
                        <div class="card hero-card">
                            <span class="hero-title">Jumlah Total Pendaftar</span>
                            <span class="hero-value">${totalPendaftar}</span>
                        </div>

                        <!-- Kartu Ringkasan Kategori Jenjang -->
                        <div class="card">
                            <div class="card-title">Kategori Pendaftar</div>
                            <div class="category-row">
                                ${kategoriHtml}
                            </div>
                        </div>

                        <!-- Kartu Detail Jenis Beasiswa (Melebar penuh di laptop, Vertikal compact list) -->
                        <div class="card full-width">
                            <div class="card-title">Detail Berdasarkan Jenis Beasiswa</div>
                            <div class="dense-list-card">
                                ${beasiswaRowsHtml}
                            </div>
                        </div>
                    </div>
                `;

                // Tampilkan dashboard ke halaman web
                document.getElementById('dashboard-content').innerHTML = dashboardHtml;
            },
            error: function(err) {
                document.getElementById('dashboard-content').innerHTML = '<p style="color:#ef4444; text-align:center;">Gagal memuat data. Periksa kembali link CSV Anda.</p>';
                console.error(err);
            }
        });
    </script>

</body>
</html>
